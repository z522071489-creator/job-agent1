name: 春招岗位自动采集

on:
  # 每天北京时间 09:00 自动运行（UTC 01:00）
  schedule:
    - cron: '0 1 * * *'

  # 允许在 GitHub 网页上手动触发（方便测试）
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装系统依赖（二维码识别库）
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libzbar0

      - name: 安装 Python 依赖
        run: pip install -r requirements.txt

      - name: 运行采集脚本
        env:
          KIMI_API_KEY:   ${{ secrets.KIMI_API_KEY }}
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
        run: python job_crawler.py

      - name: 上传 Excel 文件（备份到 Artifacts）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: 招聘岗位清单-${{ github.run_number }}
          path: /tmp/招聘岗位_*.xlsx
          retention-days: 14
          if-no-files-found: ignore
